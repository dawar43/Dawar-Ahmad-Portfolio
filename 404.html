<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Dawar Ahmad</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #f4f1ea;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 520px; }
    .code {
      font-size: 140px;
      font-weight: 800;
      line-height: 1;
      color: #f5820b;
      letter-spacing: -4px;
    }
    h1 { font-size: 28px; margin-top: 8px; font-weight: 700; }
    p { color: #8a8a8a; margin-top: 16px; font-size: 16px; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 32px;
      background: #f5820b;
      color: #0a0a0a;
      padding: 14px 32px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-decoration: none;
      transition: transform .2s;
    }
    a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
